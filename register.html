<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | FOSS CLUB</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;

      background: linear-gradient(135deg, #8eaaf1, #0f1b3c);

      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: rgb(240, 242, 245);
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);

      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    p {
      font-size: 16px;
      color: #ddd4d4;
      font-family: cursive;
    }

    /* ✅ WHITE BUTTON */
    .btn {
      color: #070708;
      margin-top: 25px;
      padding: 10px 20px;
      border: none;
      background: white;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      background: #e5e7eb;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Registrations Opening Soon</h1>
    <p>Stay tuned for upcoming events and exciting opportunities!</p>

    <!-- Back button -->
    <a href="index.html">
      <button class="btn"><b>GO BACK</b></button>
    </a>
  </div>

</body>
</html>
